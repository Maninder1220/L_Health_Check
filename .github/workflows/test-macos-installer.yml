name: Test OSAI macOS Installer

on:
  workflow_dispatch:
    inputs:
      osai_ref:
        description: "OS.rs branch, tag, or commit containing osai-agent"
        required: false
        default: "main"
  pull_request:
    paths:
      - "mac0s-ci-redy-check.sh"
      - ".github/workflows/test-macos-installer.yml"
  push:
    branches:
      - main
    paths:
      - "mac0s-ci-redy-check.sh"
      - ".github/workflows/test-macos-installer.yml"

permissions:
  contents: read

jobs:
  static-checks:
    name: Bash and ShellCheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out test repository
        uses: actions/checkout@v6

      - name: Validate Bash syntax
        run: bash -n mac0s-ci-redy-check.sh

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck -x mac0s-ci-redy-check.sh

  macos-smoke-test:
    name: macOS smoke test (${{ matrix.os }})
    needs: static-checks
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - macos-26

    steps:
      - name: Check out test repository
        uses: actions/checkout@v6

      # Use a separate, explicit checkout for the actual OSAI application.
      # This prevents REPO_URL=${GITHUB_WORKSPACE} from accidentally cloning a
      # scripts-only repository or a branch that does not contain osai-agent.
      - name: Check out OSAI application source
        uses: actions/checkout@v6
        with:
          repository: Maninder1220/OS.rs
          ref: ${{ github.event.inputs.osai_ref || 'main' }}
          path: _osai_source
          fetch-depth: 1

      - name: Verify checked-out OSAI layout
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "Workflow repository: $GITHUB_WORKSPACE"
          echo "OSAI source:         $GITHUB_WORKSPACE/_osai_source"
          git -C "$GITHUB_WORKSPACE/_osai_source" rev-parse --short HEAD
          find "$GITHUB_WORKSPACE/_osai_source" -mindepth 1 -maxdepth 2 -print | sort | sed -n '1,120p'
          test -d "$GITHUB_WORKSPACE/_osai_source/osai-agent"
          test -f "$GITHUB_WORKSPACE/_osai_source/osai-agent/Cargo.toml"

      - name: Show runner details
        run: |
          sw_vers
          uname -a
          uname -m
          /bin/bash --version | head -n 1
          xcode-select -p
          brew --version | head -n 1

      - name: Validate installer syntax on macOS Bash
        run: /bin/bash -n mac0s-ci-redy-check.sh

      - name: Run macOS bootstrap in CI mode
        env:
          CI_MODE: "1"
          DOWNLOAD_MODEL: "0"
          INSTALL_DOCKER_DESKTOP: "0"
          SKIP_DOCKER_DAEMON: "1"
          RUN_CARGO_CHECK: "1"
          RUN_CARGO_BUILD: "0"
          STRICT_COMPOSE_CHECK: "0"
          REPO_URL: https://github.com/Maninder1220/OS.rs.git
          BASE_DIR: ${{ github.workspace }}/_osai_source
          REPO_DIR: ${{ github.workspace }}/_osai_source
          APP_DIR: ${{ github.workspace }}/_osai_source/osai-agent
          MODEL_DIR: ${{ github.workspace }}/_osai_source/osai-agent/models
        run: /bin/bash mac0s-ci-redy-check.sh

      - name: Upload bootstrap log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-bootstrap-log-${{ matrix.os }}
          path: ~/Library/Logs/osai/macos-bootstrap.log
          if-no-files-found: warn
          retention-days: 7
